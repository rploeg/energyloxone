services:
  loxone-solar-forecast:
    platform: linux/amd64
    # Build locally from Dockerfile - Portainer will build this when deployed from git
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loxone-solar-forecast
    ports:
      - "5001:5000"
    volumes:
      - solar-forecast-config:/config
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped
    networks:
      - loxone-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  solar-forecast-config:
    driver: local

networks:
  loxone-network:
    driver: bridge
